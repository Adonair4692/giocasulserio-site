<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 128 128"
  role="img"
  aria-labelledby="title"
>
  <title id="title">Cigno nero con bagliore verde</title>

  <defs>
    <filter
      id="green-glow"
      x="-50%"
      y="-50%"
      width="200%"
      height="200%"
    >
      <feGaussianBlur stdDeviation="3.5" result="blur-small"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur-large"/>

      <feMerge>
        <feMergeNode in="blur-large"/>
        <feMergeNode in="blur-small"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Bagliore verde -->
  <g
    fill="none"
    stroke="#18e6cf"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#green-glow)"
    opacity="0.95"
  >
    <path
      stroke-width="7"
      d="M84 18c-19 4-26 18-22 31 3 11 13 18 15 28 2 9-4 19-16 24-18 8-39 0-47-15 16 6 30 4 41-4 9-7 10-17 5-25-7-11-5-25 5-34 6-5 12-6 19-5Z"
    />

    <path
      fill="#18e6cf"
      stroke="none"
      d="m82 18 27 7-23 10Z"
    />
  </g>

  <!-- Cigno nero -->
  <path
    fill="none"
    stroke="#000000"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    d="M84 18c-19 4-26 18-22 31 3 11 13 18 15 28 2 9-4 19-16 24-18 8-39 0-47-15 16 6 30 4 41-4 9-7 10-17 5-25-7-11-5-25 5-34 6-5 12-6 19-5Z"
  />

  <!-- Becco nero -->
  <path
    fill="#000000"
    d="m82 18 27 7-23 10Z"
  />

  <!-- Occhio -->
  <circle
    cx="80"
    cy="24"
    r="2.5"
    fill="#dffffa"
  />
</svg>